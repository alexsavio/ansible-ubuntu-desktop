---
ansible_user: "{{ lookup('env', 'USER') }}"
ansible_group: "{{ ansible_user }}"

home_dir: "/home/{{ ansible_user }}"
downloads_dir: "{{ home_dir }}/Downloads"
soft_dir: "{{ home_dir }}/software"
tmp_install_dir: "{{ home_dir }}/tmp"
projects_dir: "{{ home_dir }}/projects"
bin_dir: "{{ home_dir }}/bin"
create_folders:
  - "{{ soft_dir }}"
  - "{{ tmp_install_dir }}"
  - "{{ projects_dir }}"
  - "{{ bin_dir }}"

homeschick_repositories: []

rsync_sync_src_dest: []

apt_packages:
  - ack
  - ca-certificates
  - cmake
  - curl
  - direnv
  - git
  - make
  - pass
  - rsync
  - ssh
  - sshpass
  - tig
  - tmux
  - vim
  - wget
  - zsh

apt_app_packages:
  - gparted
  - meld
  - vlc
  - zeal

cargo_packages:
  # CLI tools
  - bat
  - bdt
  - broot
  - calc
  - coreutils
  - ddh
  - diskonaut
  - drill
  - dtool
  - du-dust
  - eza
  - fblog
  - fd-find
  - fend
  - grex
  - just
  - kalker
  - lsd
  - monolith
  - nushell
  - oxker
  - pipecolor
  - procs
  - pumas
  - ripgrep
  - rm-improved
  - sd
  - starship
  - tailspin
  - tealdeer
  - termscp
  - tokei
  - watchexec-cli
  - xcp
  - xh
  - yazi-fm
  - yazi-cli
  - zoxide
  # Git tools
  - clog-cli
  - git-cliff
  - git-tidy
  - git-delta
  - gitui
  # Python tools
  - pylyzer
  # Network & monitoring
  - sniffnet

uvx_packages:
  - httpie
  - csvkit
  - ipython
  - ruff
  - tsrc

claude_plugin_marketplaces:
  - {
      name: "claude-plugins-official",
      url: "https://github.com/anthropics/claude-plugins-official.git",
    }

claude_plugins:
  - { name: "rust-analyzer-lsp", marketplace: "claude-plugins-official" }

zed_extensions:
  - ansible
  - dockerfile
  - git-firefly
  - html
  - just
  - make
  - nix
  - python-refactoring
  - ruff
  - toml
  - yaml
