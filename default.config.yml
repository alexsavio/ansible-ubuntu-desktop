---
ansible_user: "{{ lookup('env', 'USER') }}"
ansible_group: "{{ ansible_user }}"

home_dir: '/home/{{ ansible_user }}'
downloads_dir: '{{ home_dir }}/Downloads'
soft_dir: "{{ home_dir }}/software"
tmp_install_dir: "{{ home_dir }}/tmp"
projects_dir: "{{ home_dir }}/projects"
bin_dir: "{{ home_dir }}/bin"
create_folders:
  - "{{ soft_dir }}"
  - "{{ tmp_install_dir }}"
  - "{{ projects_dir }}"
  - "{{ bin_dir }}"

homeschick_repositories: []

rsync_sync_src_dest: []

apt_packages:
  - ack
  - ca-certificates
  - cmake
  - curl
  - direnv
  - git
  - make
  - pass
  - pipx
  - rsync
  - ssh
  - sshpass
  - tig
  - tmux
  - vim
  - wget
  - zsh

apt_app_packages:
  - gparted
  - meld
  - vlc
  - zeal

cargo_packages:
  # CLI tools
  - bat
  - bdt
  - broot
  - calc
  - coreutils
  - ddh
  - diskonaut
  - drill
  - dtool
  - du-dust
  - eza
  - fblog
  - fd-find
  - fend
  - grex
  - just
  - kalker
  - lsd
  - monolith
  - nushell
  - oxker
  - pipecolor
  - procs
  - pumas
  - ripgrep
  - rm-improved
  - sd
  - starship
  - tailspin
  - tealdeer
  - termscp
  - tokei
  - watchexec-cli
  - xcp
  - xh
  - yazi-fm
  - yazi-cli
  - zoxide
  # Git tools
  - clog-cli
  - git-cliff
  - git-tidy
  - git-delta
  - gitui
  # Python tools
  - pylyzer
  # Network & monitoring
  - sniffnet

uvx_packages:
  - httpie
  - csvkit
  - ipython
  - ruff
  - tsrc

claude_plugin_marketplaces:
  - { name: "claude-plugins-official", url: "https://github.com/anthropics/claude-plugins-official.git" }

claude_plugins:
  - { name: "rust-analyzer-lsp", marketplace: "claude-plugins-official" }

vscode_extensions:
  # Editor essentials
  - editorconfig.editorconfig
  - esbenp.prettier-vscode
  - usernamehw.errorlens
  - oderwat.indent-rainbow
  - streetsidesoftware.code-spell-checker
  - stkb.rewrap
  - gruntfuggly.todo-tree
  - sleistner.vscode-fileutils
  - stuart.unique-window-colors
  - perkovec.emoji
  - chenzhe.split-line
  - chrmarti.regex
  - lmcarreiro.vscode-smart-column-indenter
  - chouzz.vscode-better-align
  - davidanson.vscode-markdownlint
  - yzhang.markdown-all-in-one
  - ritwickdey.liveserver
  - vscode-icons-team.vscode-icons
  # Git
  - eamodio.gitlens
  - waderyan.gitblame
  - donjayamanne.githistory
  - github.vscode-pull-request-github
  - github.vscode-github-actions
  # AI
  - anthropic.claude-code
  - github.copilot-chat
  # Python
  - ms-python.python
  - ms-python.vscode-pylance
  - charliermarsh.ruff
  - pamaron.pytest-runner
  # Rust
  - rust-lang.rust-analyzer
  - tamasfe.even-better-toml
  - fill-labs.dependi
  - vadimcn.vscode-lldb
  - skellock.just
  # Web / frontend
  - bradlc.vscode-tailwindcss
  - dbaeumer.vscode-eslint
  # Infrastructure
  - hashicorp.terraform
  - 4ops.terraform
  - erd0s.terraform-autocomplete
  - redhat.ansible
  - dhoeric.ansible-vault
  - mkhl.direnv
  - ms-azuretools.vscode-docker
  - ms-vscode-remote.remote-ssh
  - ms-vscode-remote.remote-ssh-edit
  - ms-vscode-remote.remote-containers
  # Data / notebooks
  - ms-toolsai.jupyter
  - ms-toolsai.jupyter-keymap
  - ms-toolsai.jupyter-renderers
  # Other
  - dotjoshjohnson.xml
  - redhat.vscode-yaml
  - alefragnani.bookmarks
