#!/usr/bin/env ansible-playbook
---
- hosts: all
  vars_files:
    - default.config.yml

  pre_tasks:
    - name: Include playbook configuration.
      include_vars: "{{ item }}"
      with_fileglob:
        - "{{ playbook_dir }}/config.yml"
      tags: ['always']

  roles:
    - { role: main, tags: main }
    # - { role: hardware, tags: hardware }
