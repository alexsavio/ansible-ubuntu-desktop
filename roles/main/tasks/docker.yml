---
- name: docker | Create the keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: yes
  become_method: sudo

- name: docker | Add the Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  become: yes
  become_method: sudo

- name: docker | Add the Docker Apt repository
  apt_repository:
    repo: deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present
    filename: docker
  become: yes
  become_method: sudo

- name: docker | Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: yes
    state: present
  become: yes
  become_method: sudo

- name: docker | Ensure docker group exists
  group:
    name: docker
    state: present
  become: yes
  become_method: sudo

- name: docker | Add the user {{ user }} to the docker group
  user:
    name: "{{ user }}"
    group: docker
  become: yes
  become_method: sudo
